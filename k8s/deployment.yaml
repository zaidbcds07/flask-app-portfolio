apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-portfolio
  namespace: flask-portfolio
  labels:
    app: flask-portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-portfolio
  template:
    metadata:
      labels:
        app: flask-portfolio
    spec:
      containers:
      - name: flask-portfolio
        image: zlacr2026.azurecr.io/flask-portfolio:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5004
          name: http
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: flask-portfolio-secrets
              key: SECRET_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 5004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5004
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: acr-secret
