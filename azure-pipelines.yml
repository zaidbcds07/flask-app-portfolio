# Azure DevOps Pipeline for Flask Portfolio App
# Deploys to Azure Container Apps
#
# IMPORTANT: Before running this pipeline, create these service connections in Azure DevOps:
# 1. Docker Registry service connection named 'zlacr2026-connection' for ACR
# 2. Azure Resource Manager service connection named 'zl-azure-connection'
#
# See AZURE_DEVOPS_SETUP.md for detailed instructions.

trigger:
  - main
  - master

variables:
  # Container registry and image settings
  containerRegistry: 'zlacr2026.azurecr.io'
  imageRepository: 'flask-portfolio'
  tag: '$(Build.BuildId)'
  
  # Azure Container App settings
  resourceGroup: 'flask-portfolio-rg'
  containerAppName: 'flask-portfolio-app'
  containerAppEnvironment: 'flask-portfolio-env'
  
  # Service connection names - UPDATE THESE to match your Azure DevOps service connections
  acrServiceConnection: 'zlacr2026-connection'
  azureServiceConnection: 'zl-azure-connection'
  
  # REQUIRED: Add these variables in Azure DevOps Pipeline settings (as secrets)
  # SECRET_KEY: 'your-secret-key-here'  # Flask secret key - mark as secret
  # ACR_USERNAME: 'your-acr-username'    # ACR admin username - mark as secret  
  # ACR_PASSWORD: 'your-acr-password'    # ACR admin password - mark as secret
  
  # Python version
  pythonVersion: '3.12'

stages:
  # Stage 1: Build and Test
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Build and Test'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          # Set up Python
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'
          
          # Install dependencies
          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install dependencies'
          
          # Run tests (if you have tests)
          - script: |
              pip install pytest
              pytest || echo "No tests found, continuing..."
            displayName: 'Run tests'
            continueOnError: true
          
          # Lint check with flake8
          - script: |
              pip install flake8
              flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Lint warnings found"
            displayName: 'Run linting'
            continueOnError: true

  # Stage 2: Build and Push Docker Image
  - stage: BuildAndPush
    displayName: 'Build and Push Docker Image'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: BuildAndPushImage
        displayName: 'Build and Push Image'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          # Build Docker image with full tag
          - script: |
              docker build -t $(containerRegistry)/$(imageRepository):$(tag) -f dockerfile .
            displayName: 'Build Docker Image'
          
          # Login to ACR using Azure CLI
          - task: AzureCLI@2
            displayName: 'Login to ACR'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr login --name zlacr2026
          
          # Push Docker image
          - script: |
              docker push $(containerRegistry)/$(imageRepository):$(tag)
            displayName: 'Push Docker Image'

  # Stage 3: Deploy to Azure Container Apps
  - stage: Deploy
    displayName: 'Deploy to Azure Container Apps'
    dependsOn: BuildAndPush
    condition: succeeded()
    jobs:
      - deployment: DeployToContainerApp
        displayName: 'Deploy to Container App'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                # Login to Azure
                - task: AzureCLI@2
                  displayName: 'Azure Login'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Logged in to Azure"
                
                # Deploy to Azure Container Apps
                - task: AzureCLI@2
                  displayName: 'Deploy Container App'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set -e
                      echo "Checking if Container App exists..."
                      
                      # Check if required variables are set
                      if [ -z "$(SECRET_KEY)" ]; then
                        echo "ERROR: SECRET_KEY variable is not set!"
                        echo "Please add SECRET_KEY to your pipeline variables."
                        exit 1
                      fi
                      
                      if [ -z "$(ACR_USERNAME)" ] || [ -z "$(ACR_PASSWORD)" ]; then
                        echo "ERROR: ACR_USERNAME or ACR_PASSWORD variable is not set!"
                        echo "Please add ACR_USERNAME and ACR_PASSWORD to your pipeline variables."
                        exit 1
                      fi
                      
                      # Check if container app exists
                      if az containerapp show --name $(containerAppName) --resource-group $(resourceGroup) --query "name" -o tsv 2>/dev/null; then
                        echo "Container App exists. Updating..."
                        az containerapp update \
                          --name $(containerAppName) \
                          --resource-group $(resourceGroup) \
                          --image $(containerRegistry)/$(imageRepository):$(tag)
                      else
                        echo "Container App does not exist. Creating new one..."
                        echo "Environment: $(containerAppEnvironment)"
                        echo "Image: $(containerRegistry)/$(imageRepository):$(tag)"
                        
                        az containerapp create \
                          --name $(containerAppName) \
                          --resource-group $(resourceGroup) \
                          --environment $(containerAppEnvironment) \
                          --image $(containerRegistry)/$(imageRepository):$(tag) \
                          --target-port 5004 \
                          --ingress external \
                          --env-vars "SECRET_KEY=$(SECRET_KEY)" \
                          --registry-server $(containerRegistry) \
                          --registry-username "$(ACR_USERNAME)" \
                          --registry-password "$(ACR_PASSWORD)" \
                          --cpu 0.5 \
                          --memory 1Gi \
                          --min-replicas 1 \
                          --max-replicas 3
                      fi
                      
                      echo "Getting Container App URL..."
                      APP_URL=$(az containerapp show \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --query "properties.configuration.ingress.fqdn" -o tsv)
                      
                      echo "Container App URL: https://$APP_URL"
                      echo "##vso[task.setvariable variable=appUrl]https://$APP_URL"

                # Verify deployment
                - script: |
                    echo "Waiting for deployment to stabilize..."
                    sleep 30
                    curl -f -s $(appUrl) > /dev/null && echo "Deployment successful!" || echo "Deployment verification pending"
                  displayName: 'Verify Deployment'
                  continueOnError: true
